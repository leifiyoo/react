spec:
  name: sample-react
  services:
  - build_command: npm run build
    environment_slug: node-js
    git:
      branch: main
      repo_clone_url: https://github.com/digitalocean/sample-react.git
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    name: sample-react
    run_command: serve -s _static -l tcp://0.0.0.0:$PORT -n
